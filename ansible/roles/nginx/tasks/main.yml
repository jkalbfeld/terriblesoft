---
- name: Install nginx vhost config
  template:
    src: terriblesoft.conf.j2
    dest: /etc/nginx/sites-available/terriblesoft
    owner: root
    group: root
    mode: '0644'
  notify: reload nginx

- name: Enable nginx vhost
  file:
    src: /etc/nginx/sites-available/terriblesoft
    dest: /etc/nginx/sites-enabled/terriblesoft
    state: link
  notify: reload nginx

- name: Disable default nginx vhost
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Add default_server catch-all (return 444)
  copy:
    dest: /etc/nginx/sites-available/default-catchall
    content: |
      server {
          listen 80 default_server;
          listen [::]:80 default_server;
          server_name _;
          return 444;
      }
  notify: reload nginx

- name: Enable catch-all vhost
  file:
    src: /etc/nginx/sites-available/default-catchall
    dest: /etc/nginx/sites-enabled/default-catchall
    state: link
  notify: reload nginx

- name: Test nginx config
  command: nginx -t
  changed_when: false

- name: Ensure nginx is started and enabled
  systemd:
    name: nginx
    state: started
    enabled: yes
