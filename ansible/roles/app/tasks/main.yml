---
- name: Clone or update repo
  git:
    repo: "{{ app_repo }}"
    dest: "{{ app_dir }}"
    version: "{{ app_branch }}"
    force: yes
  register: git_result

- name: Install npm dependencies
  npm:
    path: "{{ app_dir }}"
    state: present
  environment:
    NODE_ENV: development

- name: Build Next.js application
  command: npm run build
  args:
    chdir: "{{ app_dir }}"
  environment:
    NODE_ENV: production
    DATA_DIR: "{{ data_dir }}"
  when: git_result.changed or (force_build | default(false))
  register: build_result
  notify: restart terriblesoft

- name: Copy static assets to standalone directory
  shell: |
    cp -r {{ app_dir }}/.next/static {{ app_dir }}/.next/standalone/.next/static
    cp -r {{ app_dir }}/public {{ app_dir }}/.next/standalone/public
  when: git_result.changed or (force_build | default(false))

- name: Set ownership on standalone directory
  file:
    path: "{{ app_dir }}/.next/standalone"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: yes

- name: Set ownership on data directory
  file:
    path: "{{ data_dir }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0750'

- name: Install systemd service
  template:
    src: terriblesoft.service.j2
    dest: /etc/systemd/system/terriblesoft.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart terriblesoft

- name: Enable and start terriblesoft service
  systemd:
    name: terriblesoft
    enabled: yes
    state: started
    daemon_reload: yes

- name: Smoke test - verify app responds
  uri:
    url: "http://127.0.0.1:{{ app_port }}/"
    status_code: 200
    timeout: 15
  retries: 5
  delay: 3
  register: smoke_test
  until: smoke_test.status == 200
