---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install system dependencies
  apt:
    name:
      - curl
      - git
      - nginx
      - certbot
      - python3-certbot-nginx
      - sqlite3
      - ufw
    state: present

- name: Create app system user
  user:
    name: "{{ app_user }}"
    system: yes
    shell: /usr/sbin/nologin
    home: "{{ app_dir }}"
    create_home: no

- name: Allow SSH through UFW
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP through UFW
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS through UFW
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny
