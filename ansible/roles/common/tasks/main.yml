---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install system dependencies
  apt:
    name:
      - git
      - curl
      - nginx
      - certbot
      - python3-certbot-nginx
      - python3-pip
      - build-essential
      - python3
      - sqlite3
    state: present

- name: Create app system user
  user:
    name: "{{ app_user }}"
    system: yes
    create_home: no
    shell: /usr/sbin/nologin

- name: Create app directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create data directory for SQLite
  file:
    path: "{{ data_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0750'

- name: Set vm.swappiness
  sysctl:
    name: vm.swappiness
    value: '10'
    state: present
    reload: yes

- name: Configure logrotate for nginx
  copy:
    dest: /etc/logrotate.d/nginx-terriblesoft
    content: |
      /var/log/nginx/terriblesoft*.log {
        daily
        missingok
        rotate 14
        compress
        delaycompress
        notifempty
        sharedscripts
        postrotate
          nginx -s reopen
        endscript
      }
